# Dev infrastructure only — postgres, redis, minio
# Usage: docker compose -f docker-compose.infra.yml up -d
name: phantom-infra

services:
  postgres:
    image: postgres:16-alpine
    container_name: phantom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: phantom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phantom}
      POSTGRES_DB: phantom_msgr
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom -d phantom_msgr"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: phantom_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: phantom_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-phantom}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-phantom_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: phantom_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-phantom} $${MINIO_ROOT_PASSWORD:-phantom_secret} &&
        mc mb --ignore-existing local/phantom-media &&
        mc anonymous set download local/phantom-media &&
        echo 'MinIO bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-phantom}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-phantom_secret}
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  minio_data:
